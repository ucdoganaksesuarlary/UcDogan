<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Aksesuarlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-gold: #FFD700;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigasiýa */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-gold);
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-gold);
        }

        /* Hero Bölümi */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .brands {
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Harytlar Setasy */
        .container {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(212, 175, 55, 0.3);
        }

        .product-card h3 {
            font-size: 18px;
            margin: 10px 0;
            color: #fff;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-gold);
            margin-bottom: 15px;
        }

        .buy-btn {
            background: linear-gradient(45deg, #BF953F, #AA771C);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(170, 119, 28, 0.4);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Üç<br>Doğan</div>
        <div class="nav-links">
            <a href="#">Baş sahypa</a>
            <a href="#">Harytlar</a>
            <a href="#">Habarlaşmak</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Telefon Ekranlary</h1>
        <div class="brands">iPhone • Samsung • Redmi • Infinix</div>
    </section>

    <div class="container">
        <div class="product-card">
            <div class="product-image">
                <span style="color: #444;">Surat ýok</span>
            </div>
            <h3>iPhone 13 Pro Ekran</h3>
            <div class="price">208 TL</div>
            <button class="buy-btn">Sargyt et</button>
        </div>

        <div class="product-card">
            <div class="product-image">
                <span style="color: #444;">Surat ýok</span>
            </div>
            <h3>Samsung S21 Ultra Ekran</h3>
            <div class="price">350 TL</div>
            <button class="buy-btn">Sargyt et</button>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Premium Aksesuar Dükany</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            --gold-solid: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --dark-pure: #050505;
            --dark-card: rgba(18, 18, 18, 0.7);
            --border-color: rgba(212, 175, 55, 0.12);
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark-pure);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at -10% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 35%);
            background-attachment: fixed;
        }

        /* Premium Navigasiýa */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-svg {
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.2));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-container:hover .logo-svg {
            transform: scale(1.05) rotate(5deg);
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Hero Bölümi */
        .hero {
            text-align: center;
            padding: 50px 20px 30px 20px;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* Grid Menýu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 10px 20px 50px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .menu-item {
            background: var(--dark-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        .menu-item:active, .menu-item:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 12px 24px var(--gold-glow);
        }

        .icon-wrapper {
            width: 65px;
            height: 65px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.4s ease;
        }

        .menu-item:hover .icon-wrapper {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold-solid);
            transform: scale(1.1);
        }

        .menu-icon {
            font-size: 28px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .menu-item span:not(.menu-icon) {
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .menu-item:hover span:not(.menu-icon) {
            color: var(--gold-solid);
        }

        .menu-item .sub-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        /* MODAL (Harytlar açylýan ekran dizaýny) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end; /* Telefonda aşakdan ýokaryk gowy açylmagy üçin */
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #0f0f0f;
            width: 100%;
            max-width: 550px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            border-top: 1px solid var(--border-color);
            padding: 30px 24px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-solid);
        }

        .close-btn {
            background: rgba(215, 175, 55, 0.1);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Haryt List Dizaýny */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-name {
            font-size: 15px;
            font-weight: 600;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .product-price {
            font-weight: 700;
            color: var(--gold-solid);
            font-size: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <svg class="logo-svg" width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="6" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M2 18C2 15.5 4 13.5 6.5 13.5" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="18" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M17.5 13.5C20 13.5 22 15.5 22 18" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="12" cy="8" r="3" fill="#FFD700"/>
                <path d="M8.5 19C8.5 16.5 10 14.5 12 14.5C14 14.5 15.5 16.5 15.5 19" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Üç Dogan</span>
        </div>
    </nav>

    <section class="hero">
        <h1>Aksesuar Dükany</h1>
        <p>Premium hilli mobil enjamlar we aksesuarlar</p>
    </section>

    <div class="menu-grid">
        <div class="menu-item" onclick="openModal('cehollar')">
            <div class="icon-wrapper">
                <span class="menu-icon">📱</span>
            </div>
            <span>Çehollar</span>
            <span class="sub-text">Premium goraglar</span>
        </div>
        <div class="menu-item" onclick="openModal('nausniklar')">
            <div class="icon-wrapper">
                <span class="menu-icon">🎧</span>
            </div>
            <span>Nauşniklar</span>
            <span class="sub-text">Arassa ses hili</span>
        </div>
        <div class="menu-item" onclick="openModal('zaryadniklar')">
            <div class="icon-wrapper">
                <span class="menu-icon">⚡</span>
            </div>
            <span>Zarýadniklar</span>
            <span class="sub-text">Çalt we howpsuz</span>
        </div>
        <div class="menu-item" onclick="openModal('gorag_aynalary')">
            <div class="icon-wrapper">
                <span class="menu-icon">🛡️</span>
            </div>
            <span>Gorag aýnalary</span>
            <span class="sub-text">9H berk gorag</span>
        </div>
        <div class="menu-item" onclick="openModal('smart_sagatlar')">
            <div class="icon-wrapper">
                <span class="menu-icon">⌚</span>
            </div>
            <span>Smart sagatlar</span>
            <span class="sub-text">Döwrebap stiller</span>
        </div>
        <div class="menu-item" onclick="openModal('kalonkalar')">
            <div class="icon-wrapper">
                <span class="menu-icon">🔊</span>
            </div>
            <span>Kalonkalar</span>
            <span class="sub-text">Güýçli akustika</span>
        </div>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Kategoriýa</h2>
                <button class="close-btn" onclick="closeModal(force=true)">✕</button>
            </div>
            <div class="product-list" id="modalProductList">
                </div>
        </div>
    </div>

    <script>
        // Her kategoriýanyň içindäki haryt maglumatlary
        const categoryData = {
            cehollar: {
                title: "Çehollar",
                products: [
                    { name: "iPhone 15 Pro Max Premium Case", desc: "Silikon, içi kadife goragly", price: "250 TMT" },
                    { name: "Samsung S24 Ultra Leather Cover", desc: "Hakyky deri, durnukly dizaýn", price: "300 TMT" },
                    { name: "Xiaomi 14 Ultra Carbon Case", desc: "Ýeňil we gaty berk uglerod", price: "180 TMT" }
                ]
            },
            nausniklar: {
                title: "Nauşniklar",
                products: [
                    { name: "AirPods Pro 2 (Premium Copy)", desc: "Hakyky ANC (Ses basyjy) işleýär", price: "450 TMT" },
                    { name: "Anker Soundcore Life P3", desc: "Gaty güýçli bas we arassa ses", price: "600 TMT" }
                ]
            },
            zaryadniklar: {
                title: "Zarýadniklar",
                products: [
                    { name: "Anker 20W Fast Charger", desc: "iPhone üçin çalt zarýad beriji", price: "150 TMT" },
                    { name: "Samsung 45W Super Fast PD", desc: "Original adapter Type-C", price: "280 TMT" }
                ]
            },
            gorag_aynalary: {
                title: "Gorag Aýnalary",
                products: [
                    { name: "Green Lion 9H Glass", desc: "Dolu ekran, gyralary döwülmeýän", price: "80 TMT" },
                    { name: "Privacy Gizlin Aýna", desc: "Ýandan seredeniňde görkezmeýär", price: "100 TMT" }
                ]
            },
            smart_sagatlar: {
                title: "Smart Sagatlar",
                products: [
                    { name: "Watch Series 9 Premium Ultra", desc: "49mm, ähli datçikleri işleýär", price: "550 TMT" },
                    { name: "HK9 Pro Plus AMOLED", desc: "Ýokary hilli ekran, çalt prosessor", price: "400 TMT" }
                ]
            },
            kalonkalar: {
                title: "Kalonkalar",
                products: [
                    { name: "JBL Flip 6 (Premium)", desc: "Suw geçirmeýän, güýçli ses", price: "480 TMT" },
                    { name: "JBL Go 4 Mini", desc: "Gompa-göterme, amatly we dury", price: "220 TMT" }
                ]
            }
        };

        function openModal(categoryKey) {
            const data = categoryData[categoryKey];
            if (!data) return;

            document.getElementById('modalTitle').innerText = data.title;
            
            let listHtml = '';
            data.products.forEach(prod => {
                listHtml += `
                    <div class="product-item">
                        <div class="product-details">
                            <span class="product-name">${prod.name}</span>
                            <span class="product-desc">${prod.desc}</span>
                        </div>
                        <span class="product-price">${prod.price}</span>
                    </div>
                `;
            });
            
            document.getElementById('modalProductList').innerHTML = listHtml;
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Arka tarap typmaz ýaly
        }

        function closeModal(event, force = false) {
            if (force || event.target.classList.contains('modal-overlay')) {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = ''; // Skrolly yzyna açýar
            }
        }
    </script>

</body>
</html>

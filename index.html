<!DOCTYPE html>
<html lang="tk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üç Doğan Aksesuarlary</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
}

header h1{
  color:gold;
}

nav a{
  margin-left:20px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h2{
  font-size:50px;
  background: linear-gradient(to right,gold,white);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:15px;
  color:#ccc;
}

/* PRODUCTS */
.products{
  padding:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(15px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:15px;
}

.card h3{
  margin:15px 0;
}

.price{
  color:gold;
  font-size:18px;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(to right,gold,orange);
  cursor:pointer;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:50px;
}

.contact a{
  color:gold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>Üç Doğan</h1>
  <nav>
    <a href="#">Baş sahypa</a>
    <a href="#">Harytlar</a>
    <a href="#">Habarlaşmak</a>
  </nav>
</header>

<section class="hero">
  <h2>Telefon Ekranlary</h2>
  <p>iPhone • Samsung • Redmi • Infinix</p>
</section>

<section class="products">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>iPhone ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Samsung ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Redmi ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Infinix ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

  </div>
</section>

<section class="contact">
  <h2>Habarlaşmak</h2>
  <p><a href="tel:+9935016873001">+993 501 687 3001</a></p>
</section>

<footer>
  © 2026 Üç Doğan Aksesuarlary
</footer>

</body>
</html>

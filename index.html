<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Premium Aksesuar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.6);
            --border-color: rgba(212, 175, 55, 0.15);
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #f3e71a 0%, #d4af37 50%, #aa771c 100%);
            --text-main: #ffffff;
            --text-sub: #a0a0ab;
            --whatsapp: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            background-attachment: fixed;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #141419 0%, #0a0a0c 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .brand-title {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 2px;
        }

        .lang-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--gold-gradient);
            color: #000000;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .hero-section {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero-section h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .hero-section p {
            color: var(--text-sub);
            font-size: 13px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .card:active {
            transform: scale(0.97);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.03);
        }

        .card-icon {
            font-size: 32px;
            background: rgba(212, 175, 55, 0.08);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sheet-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet-wrapper {
            background: #111115;
            width: 100%;
            max-width: 500px;
            border-top-left-radius: 26px;
            border-top-right-radius: 26px;
            border-top: 1px solid var(--border-color);
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        .sheet-overlay.open .sheet-wrapper {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        .close-sheet {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .list-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-row:active {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title {
            font-size: 14px;
            font-weight: 600;
        }

        .item-desc {
            font-size: 11px;
            color: var(--text-sub);
        }

        .item-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }

        .info-card {
            background: rgba(212, 175, 55, 0.02);
            border: 1px dashed var(--gold);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .info-row {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .price-banner {
            background: rgba(212, 175, 55, 0.08);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .action-btn {
            background: var(--whatsapp);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--gold);
            color: #000;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

        <div class="lang-switcher">

        let currentLang = "tk";

        function renderMenu() {
            const langData = localization[currentLang];
            const gridContainer = document.getElementById('menuGrid');
            
            if(!gridContainer) return;

            document.getElementById('heroTitle').innerText = langData.heroTitle;
            document.getElementById('heroDesc').innerText = langData.heroDesc;

            let gridHtml = "";
            Object.keys(langData.categories).forEach(key => {
                const cat = langData.categories[key];
                gridHtml += `
                    <div class="card" onclick="openCategory('${key}')">
                        <div class="card-icon">${cat.icon}</div>
                        <span class="card-name">${cat.name}</span>
                        <span style="font-size:11px; color:var(--text-sub);">${cat.sub}</span>
                    </div>
                `;
            });
            gridContainer.innerHTML = gridHtml;
        }

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('btnTM').classList.toggle('active', lang === 'tk');
            document.getElementById('btnTR').classList.toggle('active', lang === 'tr');
            renderMenu();
            if(document.getElementById('appModal').classList.contains('open') && currentCategory) {
                openCategory(currentCategory);
            }
        }

        function openCategory(key) {
            currentCategory = key;
            const langData = localization[currentLang];
            const catInfo = langData.categories[key];
            const prods = langData.products[key] || [];

            document.getElementById('modalTitle').innerText = catInfo.name;

            let bodyHtml = '<div class="list-box">';
            if(prods.length === 0) {
                bodyHtml += `<p style="text-align:center; color:var(--text-sub); font-size:13px; padding:20px;">Haryt tapylmady.</p>`;
            } else {
                prods.forEach((p, index) => {
                    bodyHtml += `
                        <div class="item-row" onclick="openPayment('${key}', ${index})">
                            <div class="item-info">
                                <span class="item-title">${p.name}</span>
                                <span class="item-desc">${p.desc}</span>
                            </div>
                            <span class="item-price">${p.price}</span>
                        </div>
                    `;
                });
            }
            bodyHtml += '</div>';

            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('appModal').classList.add('open');
        }

<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Aksesuar Dükany</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-gold: #FFD700;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigasiýa */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Bölümi */
        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 6 Sany Menýu (Grid) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Telefonda 3 sany ýanaşyk */
            gap: 15px;
            padding: 20px 5%;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.05);
            border-color: var(--primary-gold);
        }

        .menu-icon {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .menu-item span {
            font-size: 12px;
            color: #ddd;
            font-weight: 500;
            display: block;
        }

        /* Harytlar Bölümi */
        .container {
            padding: 20px 5% 80px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: 0.4s;
            backdrop-filter: blur(8px);
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-gold);
            margin-bottom: 15px;
        }

        .buy-btn {
            background: linear-gradient(45deg, #BF953F, #AA771C);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="6" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M2 18C2 15.5 4 13.5 6.5 13.5" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="18" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M17.5 13.5C20 13.5 22 15.5 22 18" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="12" cy="8" r="3" fill="#FFD700"/>
                <path d="M8.5 19C8.5 16.5 10 14.5 12 14.5C14 14.5 15.5 16.5 15.5 19" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">ÜÇ DOGAN</span>
        </div>
    </nav>

    <section class="hero">
        <h1>Aksesuar dükany</h1>
    </section>

    <div class="menu-grid">
        <a href="#" class="menu-item">
            <span class="menu-icon">📱</span>
            <span>Menýu 1</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">🎧</span>
            <span>Menýu 2</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⚡</span>
            <span>Menýu 3</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">🛡️</span>
            <span>Menýu 4</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⌚</span>
            <span>Menýu 5</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span>Menýu 6</span>
        </a>
    </div>

    <div class="container">
        <div class="product-card">
            <div class="product-image">
                <span style="color: #444;">Surat goşuň</span>
            </div>
            <h3>iPhone 13 Pro Max</h3>
            <div class="price">208 TL</div>
            <button class="buy-btn">SARGYT ET</button>
        </div>
    </div>

</body>
</html>

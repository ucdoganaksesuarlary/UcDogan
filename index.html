<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Aksesuar Dükany</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-gold: #FFD700;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigasiýa */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Baş sarlaw */
        .hero {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero h1 {
            font-size: 28px;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 6 Sany Uly Menýu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Telefonda 2 sany uly bolar ýaly */
            gap: 20px;
            padding: 20px 6%;
        }

        .menu-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px 15px; /* Has uly bolar ýaly padding goşuldy */
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-item:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-5px);
            border-color: var(--primary-gold);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.1);
        }

        .menu-icon {
            font-size: 40px; /* Ikonkalary ulaltdyk */
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .menu-item span {
            font-size: 16px; /* Ýazgyny ulaltdyk */
            color: #fff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Arassalyk üçin harytlar bölümi aýryldy */
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="6" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M2 18C2 15.5 4 13.5 6.5 13.5" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="18" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M17.5 13.5C20 13.5 22 15.5 22 18" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="12" cy="8" r="3" fill="#FFD700"/>
                <path d="M8.5 19C8.5 16.5 10 14.5 12 14.5C14 14.5 15.5 16.5 15.5 19" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">ÜÇ DOGAN</span>
        </div>
    </nav>

    <section class="hero">
        <h1>Aksesuar dükany</h1>
    </section>

    <div class="menu-grid">
        <a href="#" class="menu-item">
            <span class="menu-icon">📱</span>
            <span>Menýu 1</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">🎧</span>
            <span>Menýu 2</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⚡</span>
            <span>Menýu 3</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">🛡️</span>
            <span>Menýu 4</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⌚</span>
            <span>Menýu 5</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span>Menýu 6</span>
        </a>
    </div>

</body>
</html>

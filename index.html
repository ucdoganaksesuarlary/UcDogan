<!DOCTYPE html>
<html lang="tk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üç Doğan Aksesuarlary</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f8f8f8;
}

/* HEADER */
header {
  background: black;
  color: gold;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 22px;
}

nav a {
  color: gold;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  background: linear-gradient(to right, black, #333);
  color: white;
  padding: 80px 30px;
  text-align: center;
}

.hero h2 {
  font-size: 40px;
}

.hero p {
  margin-top: 15px;
  font-size: 18px;
}

/* PRODUCTS */
.products {
  padding: 50px 30px;
}

.products h2 {
  text-align: center;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.price {
  color: green;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
}

/* CONTACT */
.contact {
  background: black;
  color: white;
  text-align: center;
  padding: 40px;
}

.contact a {
  color: gold;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  background: #111;
  color: gray;
}
</style>

</head>
<body>

<header>
  <h1>Üç Doğan Aksesuarlary</h1>
  <nav>
    <a href="#">Baş sahypa</a>
    <a href="#products">Harytlar</a>
    <a href="#contact">Habarlaşmak</a>
  </nav>
</header>

<section class="hero">
  <h2>Telefon aksesuarlar</h2>
  <p>Iň ýokary hilli ekranlar we aksesuarlar</p>
</section>

<section class="products" id="products">
  <h2>Harytlar</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>iPhone ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Samsung ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Redmi ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Infinix ekran</h3>
      <p class="price">208 TL</p>
      <button>Satyn al</button>
    </div>

  </div>
</section>

<section class="contact" id="contact">
  <h2>Habarlaşmak</h2>
  <p>Telefon: <a href="tel:+9935016873001">+993 501 687 3001</a></p>
</section>

<footer>
  © 2026 Üç Doğan Aksesuarlary
</footer>

</body>
</html>

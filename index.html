<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üç Dogan - Premium Aksesuar Dükany</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            --gold-solid: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --dark-pure: #050505;
            --dark-card: rgba(18, 18, 18, 0.7);
            --border-color: rgba(212, 175, 55, 0.12);
            --text-muted: #8e8e93;
            --success-green: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark-pure);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at -10% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 35%);
            background-attachment: fixed;
        }

        /* Premium Navigasiýa */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-svg {
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.2));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Hero Bölümi */
        .hero {
            text-align: center;
            padding: 50px 20px 30px 20px;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* Grid Menýu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 10px 20px 50px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .menu-item {
            background: var(--dark-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        .menu-item:active {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 12px 24px var(--gold-glow);
        }

        .icon-wrapper {
            width: 65px;
            height: 65px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .menu-icon {
            font-size: 28px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .menu-item span:not(.menu-icon) {
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .menu-item .sub-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #0f0f0f;
            width: 100%;
            max-width: 550px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            border-top: 1px solid var(--border-color);
            padding: 30px 24px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-solid);
        }

        .close-btn {
            background: rgba(215, 175, 55, 0.1);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Haryt List Dizaýny */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .product-item:hover {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .product-img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .product-name {
            font-size: 15px;
            font-weight: 600;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .product-price {
            font-weight: 700;
            color: var(--gold-solid);
            font-size: 15px;
        }

        /* TÖLEG ENJAMLARY */
        .payment-box {
            background: rgba(212, 175, 55, 0.03);
            border: 1px dashed var(--gold-solid);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .payment-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-solid);
            font-weight: 700;
        }

        .clickable-copy {
            cursor: pointer;
            transition: background 0.2s;
        }

        .clickable-copy:active {
            background: rgba(212, 175, 55, 0.1) !important;
        }

        .owner-text {
            font-size: 15px;
            font-weight: 600;
            background: rgba(255,255,255,0.02);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .iban-text {
            font-family: monospace;
            font-size: 16px;
            background: #000;
            padding: 12px 14px;
            border-radius: 10px;
            color: #fff;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .total-amount-box {
            font-size: 16px;
            font-weight: 700;
            margin: 16px 0;
            padding: 14px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* Toast Popup */
        .toast-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--gold-solid);
            color: #000;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Realny WhatsApp Düwmesi */
        .whatsapp-btn {
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);
            transition: all 0.2s;
        }

        .whatsapp-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="toast-notification" id="toastNotice">Nusgalandy!</div>

    <nav>
        <div class="logo-container">
            <svg class="logo-svg" width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="6" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M2 18C2 15.5 4 13.5 6.5 13.5" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="18" cy="9" r="2.5" fill="#BF953F"/>
                <path d="M17.5 13.5C20 13.5 22 15.5 22 18" stroke="#BF953F" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="12" cy="8" r="3" fill="#FFD700"/>
                <path d="M8.5 19C8.5 16.5 10 14.5 12 14.5C14 14.5 15.5 16.5 15.5 19" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Üç Dogan</span>
        </div>
    </nav>

    <section class="hero">
        <h1>Aksesuar Dükany</h1>
        <p>Premium hilli mobil enjamlar we aksesuarlar</p>
    </section>

    <div class="menu-grid">
        <div class="menu-item" onclick="openModal('cehollar')">
            <div class="icon-wrapper">
                <span class="menu-icon">📱</span>
            </div>
            <span>Çehollar</span>
            <span class="sub-text">Premium goraglar</span>
        </div>
        <div class="menu-item" onclick="openModal('nausniklar')">
            <div class="icon-wrapper">
                <span class="menu-icon">🎧</span>
            </div>
            <span>Nauşniklar</span>
            <span class="sub-text">Arassa ses hili</span>
        </div>
        <div class="menu-item" onclick="openModal('zaryadniklar')">
            <div class="icon-wrapper">
                <span class="menu-icon">⚡</span>
            </div>
            <span>Zarýadniklar</span>
            <span class="sub-text">Çalt we howpsuz</span>
        </div>
        <div class="menu-item" onclick="openModal('gorag_aynalary')">
            <div class="icon-wrapper">
                <span class="menu-icon">🛡️</span>
            </div>
            <span>Gorag aýnalary</span>
            <span class="sub-text">9H berk gorag</span>
        </div>
        <div class="menu-item" onclick="openModal('smart_sagatlar')">
            <div class="icon-wrapper">
                <span class="menu-icon">⌚</span>
            </div>
            <span>Smart sagatlar</span>
            <span class="sub-text">Döwrebap stiller</span>
        </div>
        <div class="menu-item" onclick="openModal('kalonkalar')">
            <div class="icon-wrapper">
                <span class="menu-icon">🔊</span>
            </div>
            <span>Kalonkalar</span>
            <span class="sub-text">Güýçli akustika</span>
        </div>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Kategoriýa</h2>
                <button class="close-btn" onclick="closeModal(null, true)">✕</button>
            </div>
            <div id="modalBodyArea">
                <div class="product-list" id="modalProductList"></div>
            </div>
        </div>
    </div>

    <script>
        // Harytlaryň sanawy we suratlary (img ýerine hakyky surat adyny ýazyp bilersiňiz)
        const categoryData = {
            cehollar: {
                title: "Çehollar",
                products: [
                    { name: "iPhone 15 Pro Max Case", desc: "Silikon goragly", price: "250 TMT", img: "placeholder.jpg" },
                    { name: "Samsung S24 Ultra Cover", desc: "Premium deri dizaýn", price: "300 TMT", img: "placeholder.jpg" }
                ]
            },
            nausniklar: {
                title: "Nauşniklar",
                products: [
                    { name: "AirPods Pro 2", desc: "Ýokary hilli ses we ANC", price: "450 TMT", img: "placeholder.jpg" }
                ]
            },
            zaryadniklar: {
                title: "Zarýadniklar",
                products: [
                    { name: "Anker 20W Fast Charger", desc: "Çalt zarýad beriji adapter", price: "150 TMT", img: "placeholder.jpg" },
                    { name: "Samsung 45W Ultra Adapter", desc: "Super çalt kuwwatlandyryjy", price: "350 TMT", img: "placeholder.jpg" }
                ]
            },
            gorag_aynalary: {
                title: "Gorag Aýnalary",
                products: [
                    { name: "Green Lion 9H Glass", desc: "Dolu ekran gorag", price: "80 TMT", img: "placeholder.jpg" }
                ]
            },
            smart_sagatlar: {
                title: "Smart Sagatlar",
                products: [
                    { name: "Watch Series 9 Ultra", desc: "Ähli funksiýalar işjeň", price: "550 TMT", img: "placeholder.jpg" }
                ]
            },
            kalonkalar: {
                title: "Kalonkalar",
                products: [
                    { name: "JBL Flip 6 Premium", desc: "Suw geçirmeýän güýçli akustika", price: "480 TMT", img: "placeholder.jpg" }
                ]
            }
        };

        const ibanNumber = "TR91 0015 7000 0000 0201 1511 63";
        const accountOwner = "AMAN HAYITMURADOV";
        const whatsappNumber = "99364041065";
        let activeCategoryKey = ""; // Ýalňyşlyk düzedilen ýer

        function openModal(categoryKey) {
            activeCategoryKey = categoryKey;
            const data = categoryData[categoryKey];
            if (!data) return;

            document.getElementById('modalTitle').innerText = data.title;
            
            let listHtml = '<div class="product-list">';
            data.products.forEach(prod => {
                listHtml += `
                    <div class="product-item" onclick="showPaymentPage('${prod.name.replace(/'/g, "\\'")}', '${prod.price}')">
                        <img src="${prod.img}" onerror="this.style.display='none'" class="product-img">
                        <div class="product-details">
                            <span class="product-name">${prod.name}</span>
                            <span class="product-desc">${prod.desc}</span>
                        </div>
                        <span class="product-price">${prod.price}</span>
                    </div>
                `;
            });
            listHtml += '</div>';
            
            document.getElementById('modalBodyArea').innerHTML = listHtml;
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function showPaymentPage(productName, productPrice) {
            const htmlContent = `
                <div class="payment-box">
                    <span class="payment-title">Bank Töleg Maglumaty</span>
                    <div class="owner-text clickable-copy" onclick="copyToClipboard('${accountOwner}')">Eýesi: ${accountOwner}</div>
                    <div class="iban-text clickable-copy" onclick="copyToClipboard('${ibanNumber.replace(/\s/g, "")}')">${ibanNumber}</div>
                    <span style="font-size: 11px; color: var(--text-muted); text-align:center;">Nusgalamak üçin islendik maglumatyň üstüne basyň.</span>
                </div>
                
                <div class="total-amount-box">
                    Müşderi, <span style="color: var(--gold-solid);">${productPrice}</span> töleg etmeli.
                </div>

                <button class="whatsapp-btn" onclick="sendWhatsAppNotification('${productName}', '${productPrice}')">
                    <svg viewBox="0 0 24 24">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.966 0c3.184.001 6.177 1.239 8.426 3.49s3.486 5.244 3.486 8.428c-.003 6.616-5.34 11.963-11.908 11.963-2.004-.001-3.973-.506-5.717-1.47L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.747 1.451 5.436 0 9.86-4.413 9.863-9.83.001-2.624-1.023-5.092-2.884-6.954C16.453 1.96 13.99 .936 11.96 .936c-5.437 0-9.863 4.414-9.866 9.833-.001 1.673.477 3.303 1.381 4.721L2.43 21.03l5.654-1.476zM16.65 14.8c-.26-.13-1.534-.76-1.772-.84-.238-.09-.41-.13-.58.13-.17.26-.66.84-.81.1-.15-.17-.6-.22-1.14-.7-.42-.37-.7-.83-.78-.97-.09-.14-.01-.22.06-.29.07-.06.15-.17.22-.26.08-.09.11-.15.17-.26.06-.11.03-.21-.01-.3-.04-.09-.41-1-.56-1.37-.15-.35-.29-.3-.41-.3-.11 0-.24-.01-.38-.01-.14 0-.37.05-.56.26-.19.21-.73.71-.73 1.74 0 1.03.75 2.02.85 2.16.11.14 1.47 2.25 3.56 3.15.5.21.88.34 1.19.44.5.16.96.14 1.32.08.41-.06 1.534-.63 1.75-1.23.214-.61.214-1.13.15-1.23-.06-.1-.23-.17-.49-.3z"/>
                    </svg>
                    Töleg etdim
                </button>
                
                <button style="background:transparent; border:none; color:var(--text-muted); margin-top:20px; width:100%; text-align:center; cursor:pointer; font-weight:600;" onclick="openModal(activeCategoryKey)">← Yzyna dön</button>
            `;
            document.getElementById('modalBodyArea').innerHTML = htmlContent;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toastNotice');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Nusgalap bolmady: ', err);
            });
        }

        function sendWhatsAppNotification(name, price) {
            const message = `Salam Aman, men "${name}" harydyny almak üçin ${price} töleg etdim. Ine, tassyklamasy!`;
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
        }

        function closeModal(event, force = false) {
            if (force || event.target.classList.contains('modal-overlay')) {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }
    </script>

</body>
</html>

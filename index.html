<!DOCTYPE html>

<head>

    <title>ÜÇ DOGAN | Aksesuar Dükany</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome ikonlar üçin -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <div class="header-right">

    <!-- Kategoriýalar Grid -->
    <main class="categories-grid">

            </div>

            <p>Täze modeller</p>
        </div>

        <!-- Kalonkalar -->

            <h3>Kalonkalar</h3>

        <!-- Sagatlar -->

                <i class="fa-solid fa-clock"></i>
            </div>
            <h3>Sagatlar</h3>
            <p>Smart stiller</p>
        </div>

        <!-- Zarýadniklar -->
        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h3>Zarýadniklar</h3>
            <p>Çalt we howpsuz</p>
        </div>

        <!-- Udarniklar -->
        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h3>Udarniklar</h3>
            <p>Ýokary gorag</p>
        </div>

        <!-- Telefon daşlar -->
        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-briefcase"></i>
            </div>
            <h3>Telefon daşlar</h3>
            <p>Döwrebap dizaýn</p>

    </main>

    <!-- Developer Footer (Kod Arassalygy Üçin Meta) -->

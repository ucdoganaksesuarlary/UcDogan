<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAN HAYITMURADOV | ÜÇ DOGAN</title>
    <!-- FontAwesome - Diňe kömekçi elementler üçin -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Esasy Sazlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            padding-bottom: 50px;
        }

        /* Header / Menu */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: #0b0b0b;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            border: 2px solid #d4af37;
            border-radius: 10px;
            padding: 4px 10px;
            font-weight: 700;
            color: #d4af37;
            font-size: 16px;
            background-color: rgba(212, 175, 55, 0.05);
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #222;
            color: #fff;
            padding: 9px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:active {
            transform: rotate(180deg);
        }

        .lang-switch {
            background-color: #161616;
            border-radius: 25px;
            padding: 4px;
            display: flex;
            gap: 4px;
            border: 1px solid #222;
        }

        .lang {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            color: #777;
            font-weight: 700;
            user-select: none;
            transition: all 0.2s ease;
        }

        .lang.active {
            background: linear-gradient(135deg, #f3cf65, #d4af37);
            color: #000;
        }

        /* Baş Sözbaşy */
        .hero-section {
            text-align: center;
            margin: 40px 0 30px 0;
            padding: 0 20px;
        }

        .hero-section h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .hero-section p {
            color: #666;
            font-size: 14px;
        }

        /* Kategoriýalar Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 6%;
        }

        /* Kartlar */
        .card {
            background-color: #121212;
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            border: 1px solid #1a1a1a;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card.featured {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .card:hover {
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        /* Hakyky Önüm Suratlary Üçin Tegelek Gaba */
        .icon-wrapper {
            background-color: #1a1a1a;
            width: 80px; /* Suratlaryň professional görünmegi üçin azda-kand uldaltdym */
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 18px auto;
            border: 1px solid #262626;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.05); /* Premium neon öwüşgin */
            overflow: hidden;
        }

        /* Suratlaryň Gaplaňyş Sazlamalary */
        .icon-wrapper img {
            width: 75%;  
            height: 75%;
            object-fit: contain; /* Gysylman, arassa hakyky durky */
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5)); /* Önüme hakyky gölgediriji effect */
        }

        .card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .card p {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-left">
            <div class="logo-box">3D</div>
            <span class="brand-name">ÜÇ DOGAN</span>
        </div>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn"><i class="fa-solid fa-arrows-rotate"></i></button>
            <div class="lang-switch">
                <span class="lang active" id="lang-tm" onclick="switchLanguage('tm')">TM</span>
                <span class="lang" id="lang-tr" onclick="switchLanguage('tr')">TR</span>
            </div>
        </div>
    </header>

    <!-- Baş Sözbaşy -->
    <section class="hero-section">
        <h1 id="main-title">Aksesuar Dükany</h1>
        <p id="main-desc">Premium hilli mobil enjamlar we aksesuarlar</p>
    </section>

    <!-- Grid Kartlar -->
    <main class="categories-grid">
        
        <!-- Telefonlar -->
        <div class="card featured">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/L6p0Qj4/phone-premium.png" alt="Telefonlar">
            </div>
            <h3 id="cat-1-title">Telefonlar</h3>
            <p id="cat-1-desc">Täze modeller</p>
        </div>

        <!-- Kalonkalar -->
        <div class="card">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/M738VfQ/speaker-premium.png" alt="Kalonkalar">
            </div>
            <h3 id="cat-2-title">Kalonkalar</h3>
            <p id="cat-2-desc">Güýçli akustika</p>
        </div>

        <!-- Sagatlar -->
        <div class="card">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/mH6fX4j/watch-premium.png" alt="Sagatlar">
            </div>
            <h3 id="cat-3-title">Sagatlar</h3>
            <p id="cat-3-desc">Smart stiller</p>
        </div>

        <!-- Zarýadniklar -->
        <div class="card">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/Xz9R94p/charger-premium.png" alt="Zarýadniklar">
            </div>
            <h3 id="cat-4-title">Zarýadniklar</h3>
            <p id="cat-4-desc">Çalt we howpsuz</p>
        </div>

        <!-- Udarniklar -->
        <div class="card">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/L8vbyg5/glass-premium.png" alt="Udarniklar">
            </div>
            <h3 id="cat-5-title">Udarniklar</h3>
            <p id="cat-5-desc">Ýokary gorag</p>
        </div>

        <!-- Telefon daşlar -->
        <div class="card">
            <div class="icon-wrapper">
                <img src="https://i.ibb.co/3kWyvS9/case-premium.png" alt="Telefon daşlar">
            </div>
            <h3 id="cat-6-title">Telefon daşlar</h3>
            <p id="cat-6-desc">Döwrebap dizaýn</p>
        </div>

    </main>

    <!-- JavaScript Kodlary -->
    <script>
        const translations = {
            tm: {
                title: "Aksesuar Dükany",
                desc: "Premium hilli mobil enjamlar we aksesuarlar",
                cat1T: "Telefonlar", cat1D: "Täze modeller",
                cat2T: "Kalonkalar", cat2D: "Güýçli akustika",
                cat3T: "Sagatlar", cat3D: "Smart stiller",
                cat4T: "Zarýadniklar", cat4D: "Çalt we howpsuz",
                cat5T: "Udarniklar", cat5D: "Ýokary gorag",
                cat6T: "Telefon daşlar", cat6D: "Döwrebap dizaýn"
            },
            tr: {
                title: "Aksesuar Dünyası",
                desc: "Premium kalite mobil cihazlar ve aksesuarlar",
                cat1T: "Telefonlar", cat1D: "Yeni modeller",
                cat2T: "Hoparlörler", cat2D: "Güçlü akustik",
                cat3T: "Saatler", cat3D: "Akıllı stiller",
                cat4T: "Şarj Cihazları", cat4D: "Hızlı ve güvenli",
                cat5T: "Ekran Koruyucular", cat5D: "Yüksek koruma",
                cat6T: "Telefon Kılıfları", cat6D: "Modern tasarım"
            }
        };

        function switchLanguage(lang) {
            document.getElementById('lang-tm').classList.remove('active');
            document.getElementById('lang-tr').classList.remove('active');
            document.getElementById('lang-' + lang).classList.add('active');

            document.getElementById('main-title').innerText = translations[lang].title;
            document.getElementById('main-desc').innerText = translations[lang].desc;
            
            document.getElementById('cat-1-title').innerText = translations[lang].cat1T;
            document.getElementById('cat-1-desc').innerText = translations[lang].cat1D;
            
            document.getElementById('cat-2-title').innerText = translations[lang].cat2T;
            document.getElementById('cat-2-desc').innerText = translations[lang].cat2D;
            
            document.getElementById('cat-3-title').innerText = translations[lang].cat3T;
            document.getElementById('cat-3-desc').innerText = translations[lang].cat3D;
            
            document.getElementById('cat-4-title').innerText = translations[lang].cat4T;
            document.getElementById('cat-4-desc').innerText = translations[lang].cat4D;
            
            document.getElementById('cat-5-title').innerText = translations[lang].cat5T;
            document.getElementById('cat-5-desc').innerText = translations[lang].cat5D;
            
            document.getElementById('cat-6-title').innerText = translations[lang].cat6T;
            document.getElementById('cat-6-desc').innerText = translations[lang].cat6D;
        }

        document.getElementById('refreshBtn').addEventListener('click', function() {
            location.reload();
        });
    </script>

</body>
</html>

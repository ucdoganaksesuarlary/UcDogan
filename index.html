<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÜÇ DOGAN | Premium Aksesuar</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Ähli elementleri nollamak */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0b0b; /* Asyl gara fon */
            color: #ffffff;
            padding-bottom: 50px;
        }

        /* 1-nji suratdaky ýaly hakyky professional Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: #0b0b0b;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            border: 2px solid #d4af37; /* Altyn ramka */
            border-radius: 10px;
            padding: 4px 10px;
            font-weight: 700;
            color: #d4af37;
            font-size: 16px;
            background-color: rgba(212, 175, 55, 0.05);
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37; /* Altyn ýazgy */
            letter-spacing: 1.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #222;
            color: #fff;
            padding: 9px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        
        .refresh-btn:active {
            transform: rotate(180deg);
        }

        .lang-switch {
            background-color: #161616;
            border-radius: 25px;
            padding: 4px;
            display: flex;
            gap: 4px;
            border: 1px solid #222;
        }

        .lang {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            color: #777;
            font-weight: 700;
            user-select: none;
            transition: all 0.2s ease;
        }

        .lang.active {
            background: linear-gradient(135deg, #f3cf65, #d4af37);
            color: #000;
        }

        /* Baş Sözbaşy */
        .hero-section {
            text-align: center;
            margin: 40px 0 30px 0;
            padding: 0 20px;
        }

        .hero-section h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .hero-section p {
            color: #666;
            font-size: 14px;
        }

        /* Grid gurluşy (Düzüwli 2 sütün) */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 6%;
        }

        /* Kartlaryň dizaýny */
        .card {
            background-color: #121212;
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            border: 1px solid #1a1a1a;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        /* Saýlanan kart (Telefonlar çep tarap) */
        .card.featured {
            border-color: #d4af37;
        }

        .card:hover {
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        /* Tegelek Ikonka Gabasy */
        .icon-wrapper {
            background-color: #1a1a1a;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 18px auto;
            border: 1px solid #262626;
        }

        /* Ikonkalaryň hakyky durky we professional reňki */
        .icon-wrapper i {
            font-size: 26px;
            color: #ffffff;
            display: inline-block;
            line-height: 1;
        }

        .card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .card p {
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box">3D</div>
            <span class="brand-name">ÜÇ DOGAN</span>
        </div>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn"><i class="ri-refresh-line"></i></button>
            <div class="lang-switch">
                <span class="lang active" id="lang-tm" onclick="switchLanguage('tm')">TM</span>
                <span class="lang" id="lang-tr" onclick="switchLanguage('tr')">TR</span>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <h1 id="main-title">Aksesuar Dükany</h1>
        <p id="main-desc">Premium hilli mobil enjamlar we aksesuarlar</p>
    </section>

    <main class="categories-grid">
        
        <div class="card featured">
            <div class="icon-wrapper">
                <i class="ri-smartphone-line"></i>
            </div>
            <h3 id="cat-1-title">Telefonlar</h3>
            <p id="cat-1-desc">Täze modeller</p>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="ri-speaker-3-line"></i>
            </div>
            <h3 id="cat-2-title">Kalonkalar</h3>
            <p id="cat-2-desc">Güýçli akustika</p>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="ri-watch-2-line"></i>
            </div>
            <h3 id="cat-3-title">Sagatlar</h3>
            <p id="cat-3-desc">Smart stiller</p>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="ri-charging-pile-line"></i>
            </div>
            <h3 id="cat-4-title">Zarýadniklar</h3>
            <p id="cat-4-desc">Çalt we howpsuz</p>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="ri-shield-check-line"></i>
            </div>
            <h3 id="cat-5-title">Udarniklar</h3>
            <p id="cat-5-desc">Ýokary gorag</p>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="ri-phone-case-line"></i>
            </div>
            <h3 id="cat-6-title">Telefon daşlar</h3>
            <p id="cat-6-desc">Döwrebap dizaýn</p>
        </div>

    </main>

    <script>
        const translations = {
            tm: {
                title: "Aksesuar Dükany",
                desc: "Premium hilli mobil enjamlar we aksesuarlar",
                cat1T: "Telefonlar", cat1D: "Täze modeller",
                cat2T: "Kalonkalar", cat2D: "Güýçli akustika",
                cat3T: "Sagatlar", cat3D: "Smart stiller",
                cat4T: "Zarýadniklar", cat4D: "Çalt we howpsuz",
                cat5T: "Udarniklar", cat5D: "Ýokary gorag",
                cat6T: "Telefon daşlar", cat6D: "Döwrebap dizaýn"
            },
            tr: {
                title: "Aksesuar Dünyası",
                desc: "Premium kalite mobil cihazlar ve aksesuarlar",
                cat1T: "Telefonlar", cat1D: "Yeni modeller",
                cat2T: "Hoparlörler", cat2D: "Güçlü akustik",
                cat3T: "Saatler", cat3D: "Akıllı stiller",
                cat4T: "Şarj Cihazları", cat4D: "Hızlı ve güvenli",
                cat5T: "Ekran Koruyucular", cat5D: "Yüksek koruma",
                cat6T: "Telefon Kılıfları", cat6D: "Modern tasarım"
            }
        };

        function switchLanguage(lang) {
            document.getElementById('lang-tm').classList.remove('active');
            document.getElementById('lang-tr').classList.remove('active');
            document.getElementById('lang-' + lang).classList.add('active');

            document.getElementById('main-title').innerText = translations[lang].title;
            document.getElementById('main-desc').innerText = translations[lang].desc;
            
            document.getElementById('cat-1-title').innerText = translations[lang].cat1T;
            document.getElementById('cat-1-desc').innerText = translations[lang].cat1D;
            
            document.getElementById('cat-2-title').innerText = translations[lang].cat2T;
            document.getElementById('cat-2-desc').innerText = translations[lang].cat2D;
            
            document.getElementById('cat-3-title').innerText = translations[lang].cat3T;
            document.getElementById('cat-3-desc').innerText = translations[lang].cat3D;
            
            document.getElementById('cat-4-title').innerText = translations[lang].cat4T;
            document.getElementById('cat-4-desc').innerText = translations[lang].cat4D;
            
            document.getElementById('cat-5-title').innerText = translations[lang].cat5T;
            document.getElementById('cat-5-desc').innerText = translations[lang].cat5D;
            
            document.getElementById('cat-6-title').innerText = translations[lang].cat6T;
            document.getElementById('cat-6-desc').innerText = translations[lang].cat6D;
        }

        document.getElementById('refreshBtn').addEventListener('click', function() {
            location.reload();
        });
    </script>

</body>
</html>
